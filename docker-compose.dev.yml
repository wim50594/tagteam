services:
  backend:
    build:
      context: ./backend
    environment:
      - DATABASE_URL=${DATABASE_URL:-sqlite+aiosqlite:////data/tagteam.db}
      - JWT_SECRET=${JWT_SECRET:-change_me_to_a_long_random_secret_string}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-changeme123}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:5173}
      - MEDIA_DIR=${MEDIA_DIR:-/data/media}
      - COOKIE_SECURE=false
    volumes:
      - ./backend:/app
      - ./data:/data
    ports:
      - "8000:8000"
    command: uv run --project /app uvicorn main:app --app-dir /app/app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      target: builder
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      - node_modules:/app/node_modules
    ports:
      - "5173:5173"
    command: npm run dev -- --host 0.0.0.0

volumes:
  node_modules: