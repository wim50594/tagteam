name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ── Backend tests ──────────────────────────────────────────
  test-backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: tagteams
          POSTGRES_PASSWORD: tagteams
          POSTGRES_DB: tagteams_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        working-directory: ./backend
        run: uv sync --frozen

      - name: Run tests
        working-directory: ./backend
        run: uv run pytest -v
        env:
          PYTHONPATH: .
          DATABASE_URL: postgresql+asyncpg://tagteams:tagteams@localhost:5432/tagteams_test
          JWT_SECRET: ci-test-secret-do-not-use-in-prod

  # ── Frontend tests ─────────────────────────────────────────
  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run linter
        working-directory: ./frontend
        run: npm run lint --if-present || true

      - name: Type-check
        working-directory: ./frontend
        run: npx tsc --noEmit --if-present || true

      - name: Build
        working-directory: ./frontend
        run: npm run build

  # ── Docker build validation (no push) ──────────────────────
  docker-build:
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Build backend (validate only)
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend (validate only)
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
