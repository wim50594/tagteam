name: Release
on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  workflow_dispatch:

permissions: { contents: write, packages: write }

# Cancel in-progress runs on the same branch — prevents race
# conditions when multiple commits are pushed in quick succession.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      matrix:
        component: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Bump version and push tag
        id: auto_tag
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: anothrNick/github-tag-action@1.71.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WITH_V: true
          DEFAULT_BUMP: patch
        continue-on-error: true

      # ── Determine version ──────────────────────────────────
      # Manual tag push: use the tag as-is.
      # Auto tag success: use the newly created tag.
      # Auto tag failed: the tag already exists from a previous
      #   partial run → fall back to the highest existing tag.
      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${{ github.ref_name }}"
          elif [[ -n "${{ steps.auto_tag.outputs.new_tag }}" ]]; then
            VERSION="${{ steps.auto_tag.outputs.new_tag }}"
          else
            git fetch --tags --force
            VERSION=$(git tag -l 'v*' --sort=-v:refname | head -1)
            if [[ -z "$VERSION" ]]; then
              echo "ERROR: No version tag found"
              exit 1
            fi
            echo "::notice::Auto-bump skipped (tag exists). Using $VERSION"
          fi

          CLEAN_VERSION="${VERSION#v}"
          echo "value=$CLEAN_VERSION" >> "$GITHUB_OUTPUT"
          echo "raw_tag=$VERSION" >> "$GITHUB_OUTPUT"

      # Docker setups
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: docker.io/lehrstuhlkesdogan/tagteam-${{ matrix.component }}
          tags: |
            type=semver,pattern={{version}},value=${{ steps.version.outputs.raw_tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.version.outputs.raw_tag }}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.component }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ steps.version.outputs.value }}
            VITE_APP_VERSION=${{ steps.version.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.raw_tag }}
          name: Release ${{ steps.version.outputs.raw_tag }}
          generate_release_notes: true