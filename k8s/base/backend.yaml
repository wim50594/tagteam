apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: backend-media
  namespace: tagteams
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: tagteams
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: lehrstuhlkesdogan/tagteams-backend:latest
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: tagteams-secrets
            - configMapRef:
                name: tagteams-config
          volumeMounts:
            - name: media
              mountPath: /app/data/media
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: media
          persistentVolumeClaim:
            claimName: backend-media
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: tagteams
spec:
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000
