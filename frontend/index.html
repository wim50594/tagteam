<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MultiTag Suite</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body { background: #f1f5f9; }
    .drop-active { border-color: #6366f1 !important; background: #eef2ff !important; }
    .tag-chip { display:inline-flex;align-items:center;gap:4px;background:#e0e7ff;color:#3730a3;border-radius:6px;padding:2px 8px;font-size:12px;font-weight:600; }
    .tag-chip button { background:none;border:none;cursor:pointer;color:#6366f1;font-size:14px;line-height:1;padding:0; }
    .tag-chip button:hover { color:#1e1b4b; }
    ::-webkit-scrollbar { width:6px; height:6px; }
    ::-webkit-scrollbar-track { background:#f1f5f9; }
    ::-webkit-scrollbar-thumb { background:#cbd5e1;border-radius:3px; }
    .suggestion-item:hover { background: #eef2ff; }
    .suggestion-item.top-level { font-weight:700;color:#1e1b4b; }
    .progress-bar { transition: width 0.4s ease; }
    input[type=file] { display:none; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;
const API = 'http://localhost:8000';

// ── Utils ──────────────────────────────────────────────────────────────────
function buildBatches(itemIds, annotators, verifyMode, verifiersPerItem = null) {
  const n = itemIds.length;
  const a = annotators.length;
  if (a === 0) return {};
  const batches = {};
  annotators.forEach(ann => { batches[ann] = []; });

  if (!verifyMode) {
    // Round-robin split
    itemIds.forEach((id, i) => { batches[annotators[i % a]].push(id); });
    return batches;
  }

  // Verification mode with configurable verifiers per item
  const k = Math.min(verifiersPerItem || a, a); // can't have more verifiers than annotators
  if (k >= a) {
    // Everyone annotates everything
    annotators.forEach(ann => { batches[ann] = [...itemIds]; });
    return batches;
  }

  // Total annotations needed = n * k
  // Distribute evenly across annotators: some get ceil(n*k/a), others get floor(n*k/a)
  const totalAnnotations = n * k;
  const baseCount = Math.floor(totalAnnotations / a);
  const extra = totalAnnotations % a; // first `extra` annotators get baseCount+1

  // Build a pool: for each item, pick k annotators in round-robin rotation
  // We use a load-aware assignment: always pick the k least-loaded annotators
  const load = {};
  annotators.forEach(ann => { load[ann] = 0; });

  itemIds.forEach(id => {
    // Sort annotators by load ascending, then pick k
    const sorted = [...annotators].sort((x, y) => load[x] - load[y]);
    const chosen = sorted.slice(0, k);
    chosen.forEach(ann => { batches[ann].push(id); load[ann]++; });
  });

  return batches;
}

function getAncestors(taxNode, taxonomy) {
  // Given a full_path, return all ancestor full_paths
  if (!taxNode || !taxNode.parent) return [];
  const parent = taxonomy.find(t => t.full_path === taxNode.parent);
  if (!parent) return [];
  return [...getAncestors(parent, taxonomy), parent.full_path];
}

// ── DropZone ──────────────────────────────────────────────────────────────
function DropZone({ onFiles, accept, label, icon, color="indigo", multi=true, directory=false }) {
  const [active, setActive] = useState(false);
  const ref = useRef();
  const dirRef = useRef();
  const colors = {
    indigo: { border: 'border-indigo-300', bg: 'bg-indigo-50/30', text: 'text-indigo-700', btn: 'bg-indigo-600 hover:bg-indigo-700' },
    teal:   { border: 'border-teal-300',   bg: 'bg-teal-50/30',   text: 'text-teal-700',   btn: 'bg-teal-600 hover:bg-teal-700' },
  };
  const c = colors[color];

  const handleDrop = (e) => {
    e.preventDefault(); setActive(false);
    const items = e.dataTransfer.items;
    const files = [];
    if (items) {
      const traverseEntry = async (entry, path='') => {
        if (entry.isFile) {
          await new Promise(res => entry.file(f => { files.push(f); res(); }));
        } else if (entry.isDirectory) {
          const reader = entry.createReader();
          await new Promise(res => reader.readEntries(async entries => {
            for (const ent of entries) await traverseEntry(ent, path + entry.name + '/');
            res();
          }));
        }
      };
      Promise.all(Array.from(items).map(i => traverseEntry(i.webkitGetAsEntry()))).then(() => { if(files.length) onFiles(files); });
    } else {
      onFiles(Array.from(e.dataTransfer.files));
    }
  };

  return (
    <div
      className={`border-2 border-dashed ${c.border} ${c.bg} rounded-xl p-6 text-center cursor-pointer transition-all ${active ? 'drop-active' : ''}`}
      onDragOver={e => { e.preventDefault(); setActive(true); }}
      onDragLeave={() => setActive(false)}
      onDrop={handleDrop}
    >
      <div className="text-3xl mb-2">{icon}</div>
      <p className={`text-sm font-semibold ${c.text} mb-3`}>{label}</p>
      <div className="flex justify-center gap-2">
        <button onClick={() => ref.current.click()} className={`text-xs text-white ${c.btn} px-3 py-1.5 rounded-md font-medium shadow-sm`}>
          Dateien wählen
        </button>
        {directory && (
          <button onClick={() => dirRef.current.click()} className="text-xs bg-slate-600 hover:bg-slate-700 text-white px-3 py-1.5 rounded-md font-medium shadow-sm">
            Ordner wählen 📁
          </button>
        )}
      </div>
      <input ref={ref} type="file" multiple={multi} accept={accept} onChange={e => onFiles(Array.from(e.target.files))} />
      {directory && <input ref={dirRef} type="file" webkitdirectory="true" multiple onChange={e => onFiles(Array.from(e.target.files))} />}
      <p className="text-xs text-slate-400 mt-2">oder hier hineinziehen</p>
    </div>
  );
}

// ── TagSearch ──────────────────────────────────────────────────────────────
function TagSearch({ taxonomy, selected, onChange }) {
  const [query, setQuery] = useState('');
  const [open, setOpen] = useState(false);
  const inputRef = useRef();
  const dropRef = useRef();

  useEffect(() => {
    const handler = (e) => { if (dropRef.current && !dropRef.current.contains(e.target) && e.target !== inputRef.current) setOpen(false); };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, []);

  const suggestions = (() => {
    if (!query) {
      // Show top-level labels
      return taxonomy.filter(t => t.level === 1).slice(0, 12);
    }
    return taxonomy.filter(t => t.full_path.toLowerCase().includes(query.toLowerCase())).slice(0, 20);
  })();

  const addLabel = (item) => {
    // Add item and all ancestors
    const ancestors = getAncestors(item, taxonomy);
    const toAdd = [...ancestors, item.full_path].filter(fp => !selected.includes(fp));
    if (toAdd.length > 0) onChange([...selected, ...toAdd]);
    setQuery('');
    inputRef.current?.focus();
  };

  const removeLabel = (fp) => onChange(selected.filter(x => x !== fp));

  return (
    <div className="space-y-2">
      <div className="relative">
        <input
          ref={inputRef}
          type="text"
          placeholder={taxonomy.length ? "Tag suchen oder klicken für Vorschläge…" : "Keine Taxonomie geladen"}
          value={query}
          onChange={e => { setQuery(e.target.value); setOpen(true); }}
          onFocus={() => setOpen(true)}
          disabled={!taxonomy.length}
          className="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 disabled:bg-slate-100"
        />
        {open && suggestions.length > 0 && (
          <div ref={dropRef} className="absolute z-50 w-full mt-1 bg-white border border-slate-200 rounded-lg shadow-xl max-h-56 overflow-y-auto">
            {suggestions.map(item => (
              <div
                key={item.full_path}
                className={`suggestion-item px-3 py-2 cursor-pointer text-xs flex justify-between items-center ${item.level === 1 ? 'top-level' : ''} ${selected.includes(item.full_path) ? 'opacity-40' : ''}`}
                onMouseDown={e => { e.preventDefault(); if (!selected.includes(item.full_path)) addLabel(item); }}
              >
                <span>{'  '.repeat(item.level - 1)}{item.level > 1 ? '↳ ' : ''}{item.name}</span>
                <span className="text-slate-300 font-normal">{item.level > 1 ? item.full_path : ''}</span>
              </div>
            ))}
          </div>
        )}
      </div>
      {selected.length > 0 && (
        <div className="flex flex-wrap gap-1.5 p-2 border border-slate-100 rounded-lg bg-slate-50 min-h-[36px]">
          {selected.map(fp => (
            <span key={fp} className="tag-chip">
              {fp.split(' > ').pop()}
              <button onClick={() => removeLabel(fp)}>×</button>
            </span>
          ))}
        </div>
      )}
    </div>
  );
}

// ── ItemDisplay ────────────────────────────────────────────────────────────
function ItemDisplay({ item, displayColumns }) {
  if (!item) return <div className="flex items-center justify-center h-full text-slate-300 text-4xl">⏳</div>;

  if (item.type === 'image') {
    return (
      <div className="flex flex-col items-center gap-2 h-full justify-center">
        <img
          src={`${API}/api/media/${item.filename}`}
          alt={item.name}
          className="max-h-[420px] max-w-full object-contain rounded-lg shadow"
        />
        <p className="text-xs text-slate-400">{item.name}</p>
      </div>
    );
  }
  if (item.type === 'pdf') {
    return (
      <div className="flex flex-col h-full gap-1">
        <p className="text-xs text-slate-500 font-medium">{item.name}</p>
        <embed src={`${API}/api/media/${item.filename}`} type="application/pdf" className="w-full flex-1 rounded border" style={{minHeight:'400px'}} />
      </div>
    );
  }
  if (item.type === 'text') {
    return (
      <div className="h-full overflow-y-auto">
        <p className="text-xs font-bold text-slate-500 mb-2">{item.name}</p>
        <pre className="text-sm bg-slate-50 border rounded-lg p-4 whitespace-pre-wrap font-mono text-slate-700">{item.content}</pre>
      </div>
    );
  }
  if (item.type === 'table') {
    const data = item.data || {};
    const cols = displayColumns && displayColumns.length > 0
      ? displayColumns.filter(c => c in data)
      : Object.keys(data);
    return (
      <div className="h-full overflow-y-auto space-y-3">
        <p className="text-xs font-bold text-slate-400">{item.source_file || item.name}</p>
        {cols.map(k => data[k] && (
          <div key={k} className="bg-slate-50 border border-slate-200 rounded-lg p-3">
            <div className="text-[10px] font-bold uppercase tracking-wider text-indigo-500 mb-1">{k}</div>
            <div className="text-sm text-slate-800 leading-relaxed">{data[k]}</div>
          </div>
        ))}
      </div>
    );
  }
  return <div className="text-slate-400 text-sm">Unbekanntes Format</div>;
}

// ── HomeView ───────────────────────────────────────────────────────────────
function HomeView({ sessions, onNew, onResume, onRefresh }) {
  const del = async (e, sid) => {
    e.stopPropagation();
    if (!confirm('Projekt und alle Daten permanent löschen?')) return;
    await fetch(`${API}/api/sessions/${sid}`, { method: 'DELETE' });
    onRefresh();
  };

  const typeIcons = { images:'🖼️', pdfs:'📄', texts:'📝', tables:'📊', svgs:'🎨' };

  return (
    <div className="space-y-8">
      <div className="flex justify-between items-end border-b border-slate-200 pb-5">
        <div>
          <h2 className="text-2xl font-bold text-slate-900">Deine Projekte</h2>
          <p className="text-sm text-slate-500 mt-1">Wähle eine bestehende Session oder starte ein neues Annotationsprojekt.</p>
        </div>
        <button onClick={onNew} className="bg-indigo-600 text-white font-semibold py-2.5 px-5 rounded-lg shadow hover:bg-indigo-700 transition text-sm flex items-center gap-2">
          <span className="text-lg">＋</span> Neues Projekt
        </button>
      </div>
      {sessions.length === 0 ? (
        <div className="border-2 border-dashed border-slate-200 rounded-2xl p-16 text-center">
          <div className="text-5xl mb-4">🏷️</div>
          <p className="text-slate-500 font-medium">Noch keine Projekte vorhanden.</p>
          <button onClick={onNew} className="mt-4 text-indigo-600 font-semibold text-sm hover:underline">Erstes Projekt anlegen →</button>
        </div>
      ) : (
        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
          {sessions.map(s => {
            const stats = s.item_stats || {};
            return (
              <div key={s.id} className="bg-white border border-slate-200 rounded-2xl p-5 shadow-sm hover:shadow-md transition flex flex-col gap-4">
                <div className="flex justify-between items-start">
                  <div>
                    <h4 className="font-bold text-slate-900 text-base leading-tight">{s.name}</h4>
                    <p className="text-xs text-slate-400 mt-0.5">{new Date(s.created_at).toLocaleDateString('de-DE')}</p>
                  </div>
                  <button onClick={e => del(e, s.id)} className="text-xs bg-red-50 text-red-500 hover:bg-red-100 px-2 py-1 rounded-md font-medium transition">Löschen</button>
                </div>
                <div className="text-xs bg-slate-50 border border-slate-100 rounded-lg p-3 space-y-1">
                  <div><span className="font-semibold text-slate-600">👥 Annotatoren:</span> {(s.annotators || []).join(', ')}</div>
                  <div><span className="font-semibold text-slate-600">📦 Elemente:</span> {(s.item_ids || []).length}
                    {Object.entries(stats).filter(([,v])=>v>0).map(([k,v]) => <span key={k} className="ml-1 text-slate-400">{typeIcons[k]}{v}</span>)}
                  </div>
                  <div><span className="font-semibold text-slate-600">🏷️ Taxonomie:</span> {(s.taxonomy || []).length} Labels</div>
                  {s.verification_mode && <div className="text-amber-600 font-semibold">⚡ Verifizierungsmodus aktiv</div>}
                </div>
                <button onClick={() => onResume(s.id)} className="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-lg py-2 text-sm transition shadow">
                  Workspace öffnen →
                </button>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ── ConfigView ─────────────────────────────────────────────────────────────
function ConfigView({ onSessionCreated }) {
  const [step, setStep] = useState(1); // 1=data, 2=taxonomy, 3=team
  const [uploadedIds, setUploadedIds] = useState([]);
  const [uploadStats, setUploadStats] = useState(null);
  const [detectedCols, setDetectedCols] = useState([]);
  const [selectedCols, setSelectedCols] = useState([]);
  const [taxonomy, setTaxonomy] = useState([]);
  const [taxStatus, setTaxStatus] = useState(null);
  const [projectName, setProjectName] = useState('');
  const [annotators, setAnnotators] = useState('');
  const [verifyMode, setVerifyMode] = useState(false);
  const [verifiersPerItem, setVerifiersPerItem] = useState(2);
  const [loading, setLoading] = useState(false);
  const [uploading, setUploading] = useState(false);
  const [errors, setErrors] = useState({});

  const handleDataUpload = async (files) => {
    setUploading(true);
    const fd = new FormData();
    for (const f of files) fd.append('files', f);
    try {
      const res = await fetch(`${API}/api/upload-universal`, { method: 'POST', body: fd });
      const d = await res.json();
      setUploadedIds(prev => [...prev, ...d.item_ids]);
      setDetectedCols(d.columns || []);
      setSelectedCols(d.columns || []);
      setUploadStats(d.stats);
    } catch(e) { alert('Upload fehlgeschlagen: ' + e.message); }
    setUploading(false);
  };

  const handleTaxUpload = async (files) => {
    if (!files.length) return;
    const file = files[0];
    const fd = new FormData();
    fd.append('file', file);
    fd.append('has_header', 'true');
    try {
      const res = await fetch(`${API}/api/parse-labels`, { method: 'POST', body: fd });
      const d = await res.json();
      setTaxonomy(d.taxonomy || []);
      setTaxStatus(`✅ ${(d.taxonomy||[]).length} Labels aus "${file.name}" geladen.`);
    } catch(e) { alert('Taxonomie-Upload fehlgeschlagen: ' + e.message); }
  };

  const createProject = async () => {
    const annList = annotators.split(',').map(s => s.trim()).filter(Boolean);
    const errs = {};
    if (!projectName.trim()) errs.name = 'Bitte einen Projektnamen eingeben.';
    if (!annList.length) errs.annotators = 'Bitte mindestens einen Annotator angeben.';
    if (Object.keys(errs).length) { setErrors(errs); return; }
    setErrors({});

    setLoading(true);
    const id = crypto.randomUUID();
    const batches = buildBatches(uploadedIds, annList, verifyMode, verifyMode ? verifiersPerItem : null);
    const session = {
      id, name: projectName.trim(), annotators: annList, verification_mode: verifyMode,
      verifiers_per_item: verifyMode ? verifiersPerItem : 1,
      item_ids: uploadedIds, batches, taxonomy,
      display_columns: selectedCols, item_stats: uploadStats || {},
      created_at: new Date().toISOString()
    };
    await fetch(`${API}/api/sessions/save-full`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(session)
    });
    setLoading(false);
    onSessionCreated(id);
  };

  const statsIcons = { images:'🖼️', pdfs:'📄', texts:'📝', tables:'📊', svgs:'🎨' };

  return (
    <div className="max-w-4xl mx-auto space-y-6">
      {/* Stepper */}
      <div className="flex items-center gap-0">
        {[['1','Daten laden','📥'],['2','Taxonomie','🗂️'],['3','Team & Start','🚀']].map(([s, label, icon], i) => (
          <React.Fragment key={s}>
            <button onClick={() => setStep(Number(s))} className={`flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-semibold transition ${step === Number(s) ? 'bg-indigo-600 text-white shadow' : 'bg-white text-slate-500 border hover:border-indigo-300'}`}>
              <span>{icon}</span> {label}
            </button>
            {i < 2 && <div className="flex-1 h-0.5 bg-slate-200 mx-1" />}
          </React.Fragment>
        ))}
      </div>

      {/* Step 1: Data */}
      {step === 1 && (
        <div className="bg-white rounded-2xl border border-slate-200 shadow-sm p-6 space-y-5">
          <h2 className="text-lg font-bold text-slate-900">Schritt 1: Datenbasis hochladen</h2>
          <p className="text-sm text-slate-500">Unterstützte Formate: Bilder (PNG, JPG, JPEG, GIF, WEBP, SVG), PDFs, Texte (TXT, MD), Tabellen (CSV, TSV, XLSX)</p>
          <DropZone
            onFiles={handleDataUpload} icon="📥" color="indigo" directory={true} multi={true}
            label={uploading ? "Lade hoch…" : "Dateien oder Ordner hochladen"}
          />
          {uploadStats && (
            <div className="grid grid-cols-2 sm:grid-cols-4 gap-3">
              {Object.entries(uploadStats).filter(([,v])=>v>0).map(([k,v]) => (
                <div key={k} className="bg-indigo-50 border border-indigo-100 rounded-lg p-3 text-center">
                  <div className="text-2xl">{statsIcons[k]}</div>
                  <div className="text-lg font-bold text-indigo-700">{v}</div>
                  <div className="text-xs text-indigo-500 capitalize">{k}</div>
                </div>
              ))}
            </div>
          )}
          {detectedCols.length > 0 && (
            <div className="bg-amber-50 border border-amber-200 rounded-lg p-4 space-y-2">
              <p className="text-xs font-bold text-amber-800">📋 Tabellenspalten erkannt – welche sollen beim Annotieren angezeigt werden?</p>
              <div className="flex flex-wrap gap-2">
                {detectedCols.map(c => (
                  <label key={c} className="flex items-center gap-1.5 bg-white border px-3 py-1.5 rounded-lg cursor-pointer text-xs font-medium hover:border-amber-400">
                    <input type="checkbox" checked={selectedCols.includes(c)} onChange={e => e.target.checked ? setSelectedCols([...selectedCols,c]) : setSelectedCols(selectedCols.filter(x=>x!==c))} className="rounded" />
                    {c}
                  </label>
                ))}
              </div>
            </div>
          )}
          {uploadedIds.length > 0 && (
            <div className="flex justify-end">
              <button onClick={() => setStep(2)} className="bg-indigo-600 text-white font-semibold px-6 py-2 rounded-lg hover:bg-indigo-700 transition shadow text-sm">
                Weiter: Taxonomie →
              </button>
            </div>
          )}
        </div>
      )}

      {/* Step 2: Taxonomy */}
      {step === 2 && (
        <div className="bg-white rounded-2xl border border-slate-200 shadow-sm p-6 space-y-5">
          <h2 className="text-lg font-bold text-slate-900">Schritt 2: Taxonomie / Labels hochladen</h2>
          <p className="text-sm text-slate-500">
            Unterstützte Formate: CSV / TSV (hierarchisch: mehrere Spalten = Hierarchieebenen), TXT (eine Klasse pro Zeile, Hierarchie mit <code>&gt;</code>).
          </p>
          <DropZone
            onFiles={handleTaxUpload} icon="🗂️" color="teal" directory={false}
            label="Taxonomie-Datei hochladen (CSV, TSV, TXT)"
            accept=".csv,.tsv,.txt"
          />
          {taxStatus && <div className="text-sm text-teal-700 font-medium bg-teal-50 rounded-lg p-3">{taxStatus}</div>}
          {taxonomy.length > 0 && (
            <div className="border border-slate-200 rounded-lg max-h-56 overflow-y-auto">
              <table className="w-full text-xs">
                <thead className="bg-slate-50 sticky top-0">
                  <tr><th className="text-left p-2 text-slate-500">Name</th><th className="text-left p-2 text-slate-500">Pfad</th><th className="text-left p-2 text-slate-500">Ebene</th></tr>
                </thead>
                <tbody>
                  {taxonomy.slice(0,100).map((t,i) => (
                    <tr key={i} className={i%2===0?'bg-white':'bg-slate-50/50'}>
                      <td className="p-2 font-medium" style={{paddingLeft: `${(t.level-1)*16+8}px`}}>{t.level>1?'↳ ':''}{t.name}</td>
                      <td className="p-2 text-slate-400 font-mono">{t.full_path}</td>
                      <td className="p-2 text-slate-400">{t.level}</td>
                    </tr>
                  ))}
                  {taxonomy.length > 100 && <tr><td colSpan="3" className="p-2 text-center text-slate-400">… und {taxonomy.length - 100} weitere</td></tr>}
                </tbody>
              </table>
            </div>
          )}
          <div className="flex justify-between">
            <button onClick={() => setStep(1)} className="text-slate-500 font-medium text-sm hover:underline">← Zurück</button>
            {taxonomy.length > 0 && (
              <button onClick={() => setStep(3)} className="bg-teal-600 text-white font-semibold px-6 py-2 rounded-lg hover:bg-teal-700 transition shadow text-sm">
                Weiter: Team →
              </button>
            )}
          </div>
        </div>
      )}

      {/* Step 3: Team */}
      {step === 3 && (
        <div className="bg-white rounded-2xl border border-slate-200 shadow-sm p-6 space-y-5">
          <h2 className="text-lg font-bold text-slate-900">Schritt 3: Team & Projekt starten</h2>
          <div>
            <label className="block text-sm font-semibold text-slate-700 mb-1">Projektname <span className="text-red-500">*</span></label>
            <input
              type="text" value={projectName} onChange={e=>{setProjectName(e.target.value);setErrors(p=>({...p,name:null}));}}
              placeholder="z.B. Literaturscreening Q1 2025"
              className={`w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 ${errors.name ? 'border-red-400 bg-red-50' : 'border-slate-300'}`}
            />
            {errors.name && <p className="text-xs text-red-600 mt-1">⚠ {errors.name}</p>}
          </div>
          <div>
            <label className="block text-sm font-semibold text-slate-700 mb-1">Annotatoren (kommagetrennt) <span className="text-red-500">*</span></label>
            <input
              type="text" value={annotators} onChange={e=>{setAnnotators(e.target.value);setErrors(p=>({...p,annotators:null}));}}
              placeholder="z.B. Anna, Ben, Clara"
              className={`w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 ${errors.annotators ? 'border-red-400 bg-red-50' : 'border-slate-300'}`}
            />
            {errors.annotators && <p className="text-xs text-red-600 mt-1">⚠ {errors.annotators}</p>}
            {annotators.trim() && !errors.annotators && (
              <div className="mt-2 flex flex-wrap gap-2">
                {annotators.split(',').map(a=>a.trim()).filter(Boolean).map(a => (
                  <span key={a} className="bg-indigo-100 text-indigo-800 text-xs font-semibold px-2 py-1 rounded-full">👤 {a}</span>
                ))}
              </div>
            )}
          </div>
          <div className="bg-slate-50 border border-slate-200 rounded-xl p-4 space-y-4">
            <p className="text-sm font-bold text-slate-700">Batch-Modus:</p>
            <label className="flex items-start gap-3 cursor-pointer group">
              <input type="radio" checked={!verifyMode} onChange={()=>setVerifyMode(false)} className="mt-0.5" />
              <div>
                <p className="text-sm font-semibold text-slate-800">Aufgeteilt (Round-Robin)</p>
                <p className="text-xs text-slate-500 mt-0.5">Jedes Element wird genau einmal annotiert. Schnell, keine Kreuzvalidierung.</p>
                {!verifyMode && (() => {
                  const ann = annotators.split(',').map(s=>s.trim()).filter(Boolean);
                  if (!ann.length) return null;
                  const perPerson = Math.ceil(uploadedIds.length / ann.length);
                  return <p className="text-xs text-indigo-600 font-medium mt-1.5 bg-indigo-50 px-2 py-1 rounded">→ ~{perPerson} Elemente/Person · {uploadedIds.length} Elemente · {ann.length} Personen</p>;
                })()}
              </div>
            </label>
            <label className="flex items-start gap-3 cursor-pointer">
              <input type="radio" checked={verifyMode} onChange={()=>setVerifyMode(true)} className="mt-0.5" />
              <div className="w-full">
                <p className="text-sm font-semibold text-slate-800">Verifizierung (k Personen pro Element)</p>
                <p className="text-xs text-slate-500 mt-0.5">Jedes Element wird von mehreren Personen annotiert. Arbeit wird trotzdem gleichmäßig aufgeteilt. Widersprüche werden im Review aufgelöst.</p>
                {verifyMode && (() => {
                  const ann = annotators.split(',').map(s=>s.trim()).filter(Boolean);
                  const k = Math.min(verifiersPerItem, ann.length || 1);
                  const total = uploadedIds.length * k;
                  const base = ann.length ? Math.floor(total / ann.length) : 0;
                  const extra = ann.length ? total % ann.length : 0;
                  return (
                    <div className="mt-2 space-y-2">
                      <div className="flex items-center gap-3 bg-white border border-amber-200 rounded-lg px-3 py-2">
                        <label className="text-xs font-semibold text-slate-700 whitespace-nowrap">Personen pro Element:</label>
                        <input
                          type="number" min="1" max={Math.max(1, ann.length || 1)}
                          value={verifiersPerItem}
                          onChange={e => setVerifiersPerItem(Math.max(1, Math.min(Number(e.target.value), ann.length || 1)))}
                          className="w-16 border border-amber-300 rounded px-2 py-1 text-sm font-bold text-amber-700 text-center focus:outline-none focus:ring-1 focus:ring-amber-400"
                        />
                        <span className="text-xs text-slate-400">von {ann.length || '?'} verfügbar</span>
                      </div>
                      {ann.length > 0 && (
                        <div className="text-xs bg-amber-50 border border-amber-200 rounded-lg p-2.5 space-y-0.5">
                          <p className="font-semibold text-amber-800">📊 Aufwandsrechnung:</p>
                          <p className="text-amber-700">{uploadedIds.length} Elemente × {k} Personen = <strong>{total} Annotationen</strong></p>
                          <p className="text-amber-700">{total} ÷ {ann.length} Personen = {extra > 0 ? <>{extra} Person(en) à {base+1}, {ann.length-extra} Person(en) à {base}</> : <>{ann.length} Personen à {base}</>}</p>
                        </div>
                      )}
                    </div>
                  );
                })()}
              </div>
            </label>
          </div>
          <div className="flex justify-between items-center pt-2">
            <button onClick={() => setStep(2)} className="text-slate-500 font-medium text-sm hover:underline">← Zurück</button>
            <button onClick={createProject} disabled={loading || !projectName.trim() || !annotators.trim()} className="bg-indigo-600 text-white font-bold px-8 py-3 rounded-xl hover:bg-indigo-700 transition shadow text-sm disabled:opacity-40 disabled:cursor-not-allowed">
              {loading ? 'Erstelle…' : '🚀 Projekt starten'}
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

// ── WorkspaceView ──────────────────────────────────────────────────────────
function WorkspaceView({ session, onGoToReview }) {
  const [annotator, setAnnotator] = useState(session.annotators[0]);
  const [currentIndex, setCurrentIndex] = useState(0);
  const [currentItem, setCurrentItem] = useState(null);
  const [selectedLabels, setSelectedLabels] = useState([]);
  const [progress, setProgress] = useState({ labeled: 0, total: 0, pct: 0 });
  const [saving, setSaving] = useState(false);
  const [skipped, setSkipped] = useState(new Set());

  const batch = (session.batches || {})[annotator] || [];
  const taxonomy = session.taxonomy || [];

  useEffect(() => { setCurrentIndex(0); }, [annotator]);

  useEffect(() => {
    if (batch.length > 0 && currentIndex < batch.length) {
      loadItem(batch[currentIndex]);
    }
    loadProgress();
  }, [currentIndex, annotator]);

  const loadItem = async (itemId) => {
    setCurrentItem(null);
    try {
      const res = await fetch(`${API}/api/items/${itemId}`);
      const item = await res.json();
      setCurrentItem(item);
      const resL = await fetch(`${API}/api/labels/${session.id}/${annotator}`);
      const saved = await resL.json();
      setSelectedLabels(saved[itemId] || []);
    } catch(e) { console.error(e); }
  };

  const loadProgress = async () => {
    try {
      const res = await fetch(`${API}/api/sessions/${session.id}/progress`);
      const data = await res.json();
      if (data[annotator]) setProgress(data[annotator]);
    } catch(e) {}
  };

  const saveAndNext = async (skip=false) => {
    if (!batch.length) return;
    setSaving(true);
    const itemId = batch[currentIndex];
    const labels = skip ? [] : selectedLabels;
    await fetch(`${API}/api/labels/${session.id}/${annotator}`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ [itemId]: labels })
    });
    if (skip) setSkipped(prev => new Set([...prev, itemId]));
    setSaving(false);
    await loadProgress();
    if (currentIndex < batch.length - 1) setCurrentIndex(i => i + 1);
    else { alert('✅ Batch abgeschlossen!'); onGoToReview(); }
  };

  if (!batch.length) return <div className="text-center text-slate-400 py-16">Keine Items im Batch für {annotator}.</div>;

  return (
    <div className="space-y-4">
      {/* Top Bar */}
      <div className="bg-white rounded-2xl border border-slate-200 shadow-sm p-4 flex flex-col sm:flex-row gap-4 items-center justify-between">
        <div className="flex items-center gap-3">
          <label className="text-sm font-bold text-slate-600">Bearbeiter:</label>
          <select value={annotator} onChange={e => setAnnotator(e.target.value)} className="bg-indigo-50 border border-indigo-200 rounded-lg px-3 py-1.5 text-sm font-bold text-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-400">
            {session.annotators.map(a => <option key={a} value={a}>{a}</option>)}
          </select>
          <span className="text-xs text-slate-400">{currentIndex + 1} / {batch.length}</span>
        </div>
        <div className="w-full sm:w-1/3 space-y-1">
          <div className="flex justify-between text-xs font-semibold text-slate-500">
            <span>Fortschritt</span><span>{progress.labeled}/{progress.total} ({progress.pct}%)</span>
          </div>
          <div className="w-full bg-slate-100 rounded-full h-2.5 overflow-hidden">
            <div className="bg-gradient-to-r from-indigo-500 to-violet-500 h-2.5 rounded-full progress-bar" style={{width:`${progress.pct}%`}} />
          </div>
        </div>
        <button onClick={onGoToReview} className="bg-slate-800 text-white text-sm font-semibold px-4 py-2 rounded-lg hover:bg-slate-900 transition whitespace-nowrap">
          Review Dashboard →
        </button>
      </div>

      {/* Main Grid */}
      <div className="grid grid-cols-1 lg:grid-cols-12 gap-4">
        {/* Item Display */}
        <div className="lg:col-span-7 bg-white rounded-2xl border border-slate-200 shadow-sm p-5 flex flex-col gap-3" style={{minHeight:'540px'}}>
          <div className="flex-1 overflow-hidden">
            <ItemDisplay item={currentItem} displayColumns={session.display_columns || []} />
          </div>
          {/* Mini navigator */}
          <div className="border-t pt-3 flex gap-1 flex-wrap justify-center max-h-16 overflow-y-auto">
            {batch.slice(Math.max(0,currentIndex-10), currentIndex+11).map((id, relIdx) => {
              const absIdx = Math.max(0, currentIndex-10) + relIdx;
              const isSkipped = skipped.has(id);
              return (
                <button key={absIdx} onClick={() => setCurrentIndex(absIdx)}
                  className={`w-7 h-7 rounded text-xs font-bold transition ${absIdx === currentIndex ? 'bg-indigo-600 text-white' : isSkipped ? 'bg-amber-100 text-amber-600' : 'bg-slate-100 text-slate-500 hover:bg-slate-200'}`}>
                  {absIdx+1}
                </button>
              );
            })}
          </div>
        </div>

        {/* Labeling Panel */}
        <div className="lg:col-span-5 bg-white rounded-2xl border border-slate-200 shadow-sm p-5 flex flex-col gap-4">
          <div>
            <h3 className="text-sm font-bold uppercase tracking-wider text-slate-700 mb-1">🏷️ Klassifizieren</h3>
            {currentItem && <p className="text-xs text-slate-400 truncate">{currentItem.name}</p>}
          </div>
          <div className="flex-1">
            <TagSearch taxonomy={taxonomy} selected={selectedLabels} onChange={setSelectedLabels} />
          </div>
          <div className="space-y-2 border-t pt-4">
            <div className="flex gap-2">
              <button onClick={() => currentIndex > 0 && setCurrentIndex(i => i-1)} disabled={currentIndex===0} className="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-700 py-2 rounded-lg text-sm font-medium transition disabled:opacity-40">
                ← Zurück
              </button>
              <button onClick={() => saveAndNext(true)} className="px-3 bg-amber-50 hover:bg-amber-100 text-amber-700 py-2 rounded-lg text-sm font-medium transition border border-amber-200" title="Überspringen">
                ⏭
              </button>
              <button onClick={() => saveAndNext(false)} disabled={saving} className="flex-2 bg-indigo-600 hover:bg-indigo-700 text-white py-2 px-4 rounded-lg text-sm font-bold transition shadow disabled:opacity-50">
                {saving ? '…' : selectedLabels.length ? 'Speichern & Weiter →' : 'Weiter →'}
              </button>
            </div>
            {selectedLabels.length === 0 && <p className="text-xs text-slate-400 text-center">Kein Tag ausgewählt – wähle mindestens einen Tag oder überspringe.</p>}
          </div>
        </div>
      </div>
    </div>
  );
}

// ── ReviewView ─────────────────────────────────────────────────────────────
function ReviewView({ session, onBack }) {
  const [progress, setProgress] = useState({});
  const [conflicts, setConflicts] = useState([]);
  const [exportMode, setExportMode] = useState('raw');
  const [modalItem, setModalItem] = useState(null);
  const [modalSelected, setModalSelected] = useState([]);

  useEffect(() => { loadData(); }, []);

  const loadData = async () => {
    const rP = await fetch(`${API}/api/sessions/${session.id}/progress`);
    setProgress(await rP.json());
    if (session.verification_mode) {
      const rC = await fetch(`${API}/api/sessions/${session.id}/conflicts`);
      const d = await rC.json();
      setConflicts(d.conflicts || []);
    }
  };

  const openModal = (c) => { setModalItem(c); setModalSelected(c.final_labels || []); };

  const allChoices = modalItem ? [...new Set(modalItem.details.flatMap(d => d.labels))] : [];

  const saveResolution = async () => {
    await fetch(`${API}/api/sessions/${session.id}/resolve`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ item_id: modalItem.item_id, final_labels: modalSelected })
    });
    setModalItem(null);
    loadData();
  };

  const openConflicts = conflicts.filter(c => !c.resolved);
  const canMerge = !openConflicts.length;

  return (
    <div className="space-y-6">
      {/* Header */}
      <div className="bg-white rounded-2xl border border-slate-200 shadow-sm p-6 space-y-5">
        <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 border-b pb-4">
          <div>
            <h2 className="text-xl font-bold text-slate-900">Review & Export</h2>
            <p className="text-sm text-slate-500">{session.name}</p>
          </div>
          <div className="flex items-center gap-3">
            <select value={exportMode} onChange={e=>setExportMode(e.target.value)} className="border border-slate-300 rounded-lg px-3 py-2 text-sm font-medium">
              <option value="raw">Raw (pro Annotator)</option>
              <option value="merged" disabled={!canMerge}>Merged (konsolidiert)</option>
            </select>
            {!canMerge && <span className="text-xs text-amber-600 font-semibold">⚠️ {openConflicts.length} offene Konflikte</span>}
            <a href={`${API}/api/sessions/${session.id}/export?mode=${exportMode}`} className="bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2 px-5 rounded-lg text-sm shadow transition">
              Export CSV 📥
            </a>
          </div>
        </div>

        {/* Progress cards */}
        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
          {Object.entries(progress).map(([user, stat]) => (
            <div key={user} className="bg-slate-50 border border-slate-200 rounded-xl p-4">
              <div className="flex justify-between items-center mb-2">
                <span className="font-bold text-slate-800 text-sm">{user}</span>
                <span className="text-xs font-bold text-indigo-600">{stat.pct}%</span>
              </div>
              <div className="w-full bg-slate-200 rounded-full h-2 mb-1">
                <div className="bg-indigo-500 h-2 rounded-full progress-bar" style={{width:`${stat.pct}%`}} />
              </div>
              <p className="text-xs text-slate-500">{stat.labeled} von {stat.total} annotiert</p>
            </div>
          ))}
        </div>

        {/* Conflicts */}
        {session.verification_mode && (
          <div className="border-t pt-5">
            <h3 className="text-sm font-bold text-slate-700 mb-3">
              ⚡ Widersprüche 
              {openConflicts.length > 0 && <span className="ml-2 bg-red-100 text-red-700 px-2 py-0.5 rounded-full text-xs">{openConflicts.length} offen</span>}
              {conflicts.filter(c=>c.resolved).length > 0 && <span className="ml-2 bg-emerald-100 text-emerald-700 px-2 py-0.5 rounded-full text-xs">{conflicts.filter(c=>c.resolved).length} gelöst</span>}
            </h3>
            {conflicts.length === 0 ? (
              <div className="text-sm text-slate-400 text-center py-6 border border-dashed rounded-xl">Keine Widersprüche gefunden ✅</div>
            ) : (
              <div className="border border-slate-200 rounded-xl overflow-hidden">
                <table className="w-full text-xs">
                  <thead className="bg-slate-50 border-b">
                    <tr>
                      <th className="text-left p-3 font-semibold text-slate-600">Element</th>
                      <th className="text-left p-3 font-semibold text-slate-600">Typ</th>
                      <th className="text-left p-3 font-semibold text-slate-600">Abgaben</th>
                      <th className="text-left p-3 font-semibold text-slate-600">Status</th>
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-slate-100">
                    {conflicts.map(c => (
                      <tr key={c.item_id} className={`hover:bg-slate-50 cursor-pointer ${c.resolved ? 'opacity-60' : ''}`} onClick={() => openModal(c)}>
                        <td className="p-3 font-mono text-indigo-600 font-bold">{c.name?.substring(0,30) || c.item_id.substring(0,8)+'…'}</td>
                        <td className="p-3 text-slate-500">{c.type}</td>
                        <td className="p-3">
                          {c.details.map(d => <div key={d.annotator}><b>{d.annotator}:</b> [{d.labels.slice(0,2).join(', ')}{d.labels.length>2?'…':''}]</div>)}
                        </td>
                        <td className="p-3">
                          {c.resolved
                            ? <span className="bg-emerald-100 text-emerald-700 px-2 py-1 rounded font-bold">✅ Gelöst</span>
                            : <span className="bg-amber-100 text-amber-700 px-2 py-1 rounded font-bold">⚠️ Offen</span>}
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            )}
          </div>
        )}
      </div>

      <button onClick={onBack} className="text-indigo-600 font-semibold text-sm hover:underline">← Zurück zum Workspace</button>

      {/* Conflict Modal */}
      {modalItem && (
        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
          <div className="bg-white rounded-2xl shadow-2xl max-w-lg w-full overflow-hidden">
            <div className="bg-slate-900 text-white px-6 py-4 flex justify-between items-center">
              <h3 className="font-bold">Konflikt auflösen</h3>
              <button onClick={() => setModalItem(null)} className="text-slate-400 hover:text-white text-xl">×</button>
            </div>
            <div className="p-6 space-y-4">
              <p className="text-sm text-slate-500 font-medium">{modalItem.name}</p>
              <div className="bg-slate-50 rounded-lg p-3 space-y-1">
                {modalItem.details.map(d => (
                  <div key={d.annotator} className="text-xs"><span className="font-bold text-slate-700">{d.annotator}:</span> {d.labels.join(', ') || <em>keine Labels</em>}</div>
                ))}
              </div>
              <div>
                <div className="flex justify-between items-center mb-2">
                  <p className="text-xs font-bold text-slate-500 uppercase">Finale Tags auswählen:</p>
                  <div className="flex gap-2">
                    <button
                      onClick={() => setModalSelected([...allChoices])}
                      className="text-xs bg-indigo-50 hover:bg-indigo-100 text-indigo-700 font-semibold px-2.5 py-1 rounded-lg border border-indigo-200 transition"
                    >Alle auswählen</button>
                    <button
                      onClick={() => setModalSelected([])}
                      className="text-xs bg-slate-100 hover:bg-slate-200 text-slate-600 font-semibold px-2.5 py-1 rounded-lg transition"
                    >Alle abwählen</button>
                  </div>
                </div>
                <div className="space-y-1.5 max-h-48 overflow-y-auto">
                  {allChoices.map(lbl => (
                    <label key={lbl} className="flex items-center gap-2 bg-slate-50 p-2.5 border rounded-lg cursor-pointer hover:border-indigo-300 text-xs font-medium">
                      <input type="checkbox" checked={modalSelected.includes(lbl)} onChange={e => e.target.checked ? setModalSelected([...modalSelected,lbl]) : setModalSelected(modalSelected.filter(x=>x!==lbl))} className="h-4 w-4 text-indigo-600 rounded" />
                      <span>{lbl}</span>
                    </label>
                  ))}
                </div>
              </div>
            </div>
            <div className="bg-slate-50 px-6 py-3 border-t flex justify-end gap-2">
              <button onClick={() => setModalItem(null)} className="px-4 py-2 bg-white border rounded-lg text-xs font-medium hover:bg-slate-100">Abbrechen</button>
              <button onClick={saveResolution} className="px-5 py-2 bg-indigo-600 text-white font-bold rounded-lg text-xs shadow hover:bg-indigo-700">Speichern</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── App Root ───────────────────────────────────────────────────────────────
function App() {
  const [view, setView] = useState('home');
  const [sessions, setSessions] = useState([]);
  const [activeSession, setActiveSession] = useState(null);

  useEffect(() => { if (view === 'home') loadSessions(); }, [view]);

  const loadSessions = async () => {
    try {
      const res = await fetch(`${API}/api/sessions`);
      setSessions(await res.json());
    } catch(e) {}
  };

  const resumeProject = async (sid) => {
    const res = await fetch(`${API}/api/sessions/${sid}`);
    const data = await res.json();
    setActiveSession(data);
    setView('workspace');
  };

  const navItems = view !== 'home' ? [
    { id: 'config', label: 'Konfiguration' },
    { id: 'workspace', label: 'Workspace' },
    { id: 'review', label: 'Review' },
  ] : [];

  return (
    <div className="min-h-screen">
      <header className="bg-white border-b border-slate-200 sticky top-0 z-40 shadow-sm">
        <div className="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
          <button onClick={() => setView('home')} className="text-xl font-black text-indigo-600 tracking-tight flex items-center gap-2 hover:opacity-80 transition">
            🏷️ MultiTag Suite
            <span className="text-[10px] bg-indigo-100 text-indigo-700 px-2 py-0.5 rounded-full font-semibold">v3.0</span>
          </button>
          {navItems.length > 0 && (
            <nav className="flex gap-1">
              {navItems.map(n => (
                <button key={n.id} onClick={() => n.id !== 'workspace' || activeSession ? (n.id === 'workspace' ? setView('workspace') : n.id === 'review' ? setView('review') : setView(n.id)) : null}
                  className={`px-3 py-1.5 rounded-lg text-sm font-semibold transition ${view === n.id ? 'bg-indigo-600 text-white' : 'text-slate-500 hover:bg-slate-100'}`}>
                  {n.label}
                </button>
              ))}
            </nav>
          )}
        </div>
      </header>

      <main className="max-w-7xl mx-auto px-4 py-8">
        {view === 'home' && <HomeView sessions={sessions} onNew={() => setView('config')} onResume={resumeProject} onRefresh={loadSessions} />}
        {view === 'config' && <ConfigView onSessionCreated={resumeProject} />}
        {view === 'workspace' && activeSession && <WorkspaceView session={activeSession} onGoToReview={() => setView('review')} />}
        {view === 'review' && activeSession && <ReviewView session={activeSession} onBack={() => setView('workspace')} />}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
