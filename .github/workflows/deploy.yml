name: Deploy to Rancher (manual)

on:
  workflow_dispatch:
    inputs:
      backend_tag:
        description: "Backend image tag (e.g. v1.2.3, sha-abc1234, latest)"
        required: true
        default: "latest"
      frontend_tag:
        description: "Frontend image tag (e.g. v1.2.3, sha-abc1234, latest)"
        required: true
        default: "latest"

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      # Pin an old-ish kubectl that still talks comfortably to a v1.15 server
      # (client/server skew warnings are tolerated, but avoid a too-new client).
      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: "v1.21.14"

      - name: Set up kustomize
        uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: "4.5.7"

      - name: Write kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          printf '%s' "${{ secrets.KUBE_CONFIG }}" > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Verify cluster access
        run: kubectl cluster-info

      - name: Set image tags
        working-directory: k8s/overlays/prod
        run: |
          kustomize edit set image \
            lehrstuhlkesdogan/tagteam-backend=lehrstuhlkesdogan/tagteam-backend:${{ inputs.backend_tag }} \
            lehrstuhlkesdogan/tagteam-frontend=lehrstuhlkesdogan/tagteam-frontend:${{ inputs.frontend_tag }}

      - name: Render manifests
        run: kustomize build k8s/overlays/prod > rendered.yaml

      - name: Substitute config & secrets
        env:
          INGRESS_HOST: ${{ vars.INGRESS_HOST }}
          CORS_ORIGINS: ${{ vars.CORS_ORIGINS }}
          ADMIN_USERNAME: ${{ vars.ADMIN_USERNAME }}
          JWT_EXPIRE_MINUTES: ${{ vars.JWT_EXPIRE_MINUTES }}
          CACHE_TTL_SECONDS: ${{ vars.CACHE_TTL_SECONDS }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        run: |
          set -eu

          # --- required values check ---
          : "${INGRESS_HOST:?Set the repo VARIABLE INGRESS_HOST}"
          : "${JWT_SECRET:?Set the repo SECRET JWT_SECRET}"
          : "${ADMIN_PASSWORD:?Set the repo SECRET ADMIN_PASSWORD}"
          : "${POSTGRES_PASSWORD:?Set the repo SECRET POSTGRES_PASSWORD}"

          CORS_ORIGINS="${CORS_ORIGINS:-https://${INGRESS_HOST}}"
          ADMIN_USERNAME="${ADMIN_USERNAME:-admin}"
          JWT_EXPIRE_MINUTES="${JWT_EXPIRE_MINUTES:-480}"
          CACHE_TTL_SECONDS="${CACHE_TTL_SECONDS:-300}"

          DATABASE_URL="postgresql+asyncpg://tagteam:${POSTGRES_PASSWORD}@postgres:5432/tagteam"

          sed -i \
            -e "s|INGRESS_HOST_PLACEHOLDER|${INGRESS_HOST}|g" \
            -e "s|CHANGEME_JWT_SECRET|${JWT_SECRET}|g" \
            -e "s|CHANGEME_ADMIN_PASSWORD|${ADMIN_PASSWORD}|g" \
            -e "s|CHANGEME_POSTGRES_PASSWORD|${POSTGRES_PASSWORD}|g" \
            -e "s|CHANGEME_HOST|${INGRESS_HOST}|g" \
            -e "s|https://CHANGEME_HOST|${CORS_ORIGINS}|g" \
            rendered.yaml

          # ADMIN_USERNAME / JWT_EXPIRE_MINUTES / CACHE_TTL_SECONDS overrides
          # (only needed if you want to override the ConfigMap defaults baked
          # into k8s/base/configmap.yaml; uncomment/extend as needed)
          # sed -i -e "s|ADMIN_USERNAME: \"admin\"|ADMIN_USERNAME: \"${ADMIN_USERNAME}\"|" rendered.yaml

      - name: Apply manifests
        run: kubectl apply -f rendered.yaml

      - name: Wait for rollout
        run: |
          kubectl -n tagteam rollout status deployment/postgres --timeout=180s
          kubectl -n tagteam rollout status deployment/redis --timeout=120s
          kubectl -n tagteam rollout status deployment/backend --timeout=180s
          kubectl -n tagteam rollout status deployment/frontend --timeout=120s

      - name: Smoke test (via Ingress)
        env:
          INGRESS_HOST: ${{ vars.INGRESS_HOST }}
        run: |
          set -eu
          echo "Checking https://${INGRESS_HOST}/api/health ..."
          for i in $(seq 1 12); do
            code=$(curl -sk -o /dev/null -w '%{http_code}' "https://${INGRESS_HOST}/api/health" || true)
            if [ "$code" = "200" ]; then
              echo "Backend healthy (HTTP $code)"
              break
            fi
            echo "Attempt $i: got HTTP $code, retrying in 5s..."
            sleep 5
            if [ "$i" = "12" ]; then
              echo "Backend did not become healthy via Ingress" >&2
              exit 1
            fi
          done

          echo "Checking https://${INGRESS_HOST}/ ..."
          code=$(curl -sk -o /dev/null -w '%{http_code}' "https://${INGRESS_HOST}/")
          if [ "$code" != "200" ]; then
            echo "Frontend did not return HTTP 200 (got $code)" >&2
            exit 1
          fi
          echo "Frontend reachable (HTTP $code)"