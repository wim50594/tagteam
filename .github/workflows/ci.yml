name: CI
on:
  pull_request:
  push: { branches: [main] }

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12", cache: pip }
      - run: pip install -r backend/requirements.txt ruff
      - run: ruff check backend/app
      - run: python -m compileall backend/app

  frontend:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: frontend } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: npm, cache-dependency-path: frontend/package-lock.json }
      - run: npm ci || npm install
      - run: npm run build

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build backend (no push)
        uses: docker/build-push-action@v6
        with: { context: ./backend, push: false, cache-from: type=gha, cache-to: type=gha,mode=max }
      - name: Build frontend (no push)
        uses: docker/build-push-action@v6
        with: { context: ./frontend, push: false, cache-from: type=gha, cache-to: type=gha,mode=max }
