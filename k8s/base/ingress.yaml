# NOTE: networking.k8s.io/v1beta1 is the correct API version for the
# Rancher / Kubernetes 1.15.4 server in use here. (v1 Ingress requires >=1.19)
apiVersion: networking.k8s.io/v1beta1
kind: Ingress
metadata:
  name: tagteam
  namespace: tagteam
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
spec:
  tls:
    - hosts:
        - INGRESS_HOST_PLACEHOLDER
      secretName: tagteam-tls
  rules:
    - host: INGRESS_HOST_PLACEHOLDER
      http:
        paths:
          - path: /api
            backend:
              serviceName: backend
              servicePort: 8000
          - path: /
            backend:
              serviceName: frontend
              servicePort: 80
