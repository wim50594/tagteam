services:
  backend:
    build:
      context: ./backend
    environment:
      - DATABASE_URL=sqlite+aiosqlite:////data/tagteam.db
      - COOKIE_SECURE=false
      - JWT_SECRET=dev-secret-for-docker-local-use
      - ADMIN_BOOTSTRAP=false
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=changeme123
      - MEDIA_DIR=/data/media
      - CORS_ORIGINS=http://localhost:5173
    volumes:
      - ./backend/app:/app/app
      - /app/.venv
      - ./data:/data
    ports:
      - "8000:8000"
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      target: builder
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      - node_modules:/app/node_modules
    ports:
      - "5173:5173"
    command: npm run dev -- --host 0.0.0.0

volumes:
  node_modules: